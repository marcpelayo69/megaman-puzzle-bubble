<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mega Man Puzzle Bubble</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: system-ui, sans-serif;
      color: #fff;
    }
    #game-container {
      position: relative;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
      border-radius: 10px;
      overflow: hidden;
    }
    canvas {
      background: radial-gradient(circle at top, #202850 0, #050811 60%);
      display: block;
    }
    #ui {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      text-shadow: 0 0 3px #000;
    }
    #game-over {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      visibility: hidden;
    }
    #game-over button {
      margin-top: 12px;
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      background: #1e90ff;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
    }
    #game-over button:hover {
      background: #3aa3ff;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game" width="480" height="640"></canvas>
    <div id="ui">
      <div>Score: <span id="score">0</span></div>
      <div>← → move, Space shoot</div>
    </div>
    <div id="game-over">
      <div id="game-over-text">Game Over</div>
      <button id="restart-btn">Restart (R)</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const gameOverEl = document.getElementById("game-over");
    const gameOverTextEl = document.getElementById("game-over-text");
    const restartBtn = document.getElementById("restart-btn");

    const W = canvas.width;
    const H = canvas.height;

    const BUBBLE_RADIUS = 14;
    const BUBBLE_SPEED = 6;
    const SHOOTER_Y = H - 80;
    const SHOOTER_SPEED = 6;
    const COLORS = ["#ff4b4b", "#ffd93b", "#3bff8b", "#3bb5ff", "#b43bff"];

    let bubbles = [];
    let shooterX = W / 2;
    let currentBubble = null;
    let nextColor = randomColor();
    let score = 0;
    let leftPressed = false;
    let rightPressed = false;
    let spacePressed = false;
    let gameOver = false;

    const megamanImg = new Image();
    megamanImg.src = "megaman.png.JPG";
    megamanImg.onload = () => console.log("Mega Man loaded", megamanImg.width, megamanImg.height);
    megamanImg.onerror = () => console.error("Could not load megaman.png");

    function randomColor() {
      return COLORS[Math.floor(Math.random() * COLORS.length)];
    }

    function resetGame() {
      bubbles = [];
      score = 0;
      shooterX = W / 2;
      currentBubble = null;
      nextColor = randomColor();
      gameOver = false;
      scoreEl.textContent = score;
      gameOverEl.style.visibility = "hidden";
      initLevel();
    }

    function initLevel() {
      const rows = 5;
      const cols = Math.floor(W / (BUBBLE_RADIUS * 2));
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const x = BUBBLE_RADIUS + c * BUBBLE_RADIUS * 2;
          const y = BUBBLE_RADIUS + r * BUBBLE_RADIUS * 2;
          bubbles.push({
            x,
            y,
            radius: BUBBLE_RADIUS,
            color: randomColor(),
            stuck: true
          });
        }
      }
    }

    function spawnBubble() {
      currentBubble = {
        x: shooterX,
        y: SHOOTER_Y - 24,
        radius: BUBBLE_RADIUS,
        color: nextColor,
        vx: 0,
        vy: -BUBBLE_SPEED,
        moving: true
      };
      nextColor = randomColor();
    }

    function updateShooter() {
      if (leftPressed) shooterX -= SHOOTER_SPEED;
      if (rightPressed) shooterX += SHOOTER_SPEED;
      const margin = 20;
      shooterX = Math.max(margin, Math.min(W - margin, shooterX));
    }

    function updateCurrentBubble() {
      if (!currentBubble || !currentBubble.moving) return;

      currentBubble.x += currentBubble.vx;
      currentBubble.y += currentBubble.vy;

      if (currentBubble.x - currentBubble.radius < 0) {
        currentBubble.x = currentBubble.radius;
        currentBubble.vx *= -1;
      } else if (currentBubble.x + currentBubble.radius > W) {
        currentBubble.x = W - currentBubble.radius;
        currentBubble.vx *= -1;
      }

      if (currentBubble.y - currentBubble.radius <= 0) {
        stickCurrentBubble();
        return;
      }

      for (let b of bubbles) {
        const dx = currentBubble.x - b.x;
        const dy = currentBubble.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < currentBubble.radius + b.radius - 1) {
          stickCurrentBubble();
          return;
        }
      }
    }

    function stickCurrentBubble() {
      if (!currentBubble) return;
      currentBubble.moving = false;
      currentBubble.stuck = true;
      bubbles.push(currentBubble);
      const removed = handleMatches(currentBubble);
      if (removed > 0) {
        score += removed * 10;
        scoreEl.textContent = score;
      }
      checkGameOver();
      currentBubble = null;
    }

    function handleMatches(startBubble) {
      const visited = new Set();
      const stack = [startBubble];
      const sameColor = [];

      while (stack.length) {
        const b = stack.pop();
        const key = `${b.x},${b.y}`;
        if (visited.has(key)) continue;
        visited.add(key);
        if (b.color !== startBubble.color) continue;
        sameColor.push(b);

        for (let nb of bubbles) {
          const dx = b.x - nb.x;
          const dy = b.y - nb.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < b.radius * 2 + 2) {
            stack.push(nb);
          }
        }
      }

      if (sameColor.length >= 3) {
        const toRemove = new Set(sameColor);
        bubbles = bubbles.filter((b) => !toRemove.has(b));
        return sameColor.length;
      }
      return 0;
    }

    function checkGameOver() {
      for (let b of bubbles) {
        if (b.y + b.radius >= SHOOTER_Y - 10) {
          gameOver = true;
          gameOverTextEl.textContent = "Game Over!";
          gameOverEl.style.visibility = "visible";
          return;
        }
      }
      if (bubbles.length === 0) {
        gameOver = true;
        gameOverTextEl.textContent = "You Win!";
        gameOverEl.style.visibility = "visible";
      }
    }

    function drawShooter() {
      const baseY = SHOOTER_Y;
      const spriteWidth = 64;
      const spriteHeight = 96;
      const drawX = shooterX - spriteWidth / 2;
      const drawY = baseY - spriteHeight + 12;

      if (megamanImg.naturalWidth > 0) {
        ctx.drawImage(megamanImg, drawX, drawY, spriteWidth, spriteHeight);
      } else {
        ctx.fillStyle = "#2f5dff";
        ctx.fillRect(drawX, drawY, spriteWidth, spriteHeight);
      }

      ctx.fillStyle = "#3bb5ff";
      ctx.beginPath();
      ctx.arc(shooterX, drawY + 10, 6, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawCurrentBubble() {
      if (!currentBubble) return;
      drawBubble(currentBubble);
    }

    function drawBubble(b) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
      ctx.fillStyle = b.color;
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255,255,255,0.6)";
      ctx.stroke();

      const grad = ctx.createRadialGradient(
        b.x - b.radius / 3,
        b.y - b.radius / 3,
        0,
        b.x,
        b.y,
        b.radius
      );
      grad.addColorStop(0, "rgba(255,255,255,0.8)");
      grad.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawBubbles() {
      for (let b of bubbles) drawBubble(b);
    }

    function drawNextBubblePreview() {
      const x = W - 40;
      const y = H - 40;
      ctx.font = "12px system-ui";
      ctx.fillStyle = "#fff";
      ctx.fillText("Next", x - 18, y - 28);
      ctx.beginPath();
      ctx.arc(x, y, BUBBLE_RADIUS, 0, Math.PI * 2);
      ctx.fillStyle = nextColor;
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255,255,255,0.6)";
      ctx.stroke();
    }

    function gameLoop() {
      ctx.clearRect(0, 0, W, H);

      ctx.strokeStyle = "rgba(255,255,255,0.05)";
      ctx.lineWidth = 1;
      for (let y = 0; y < H / 2; y += BUBBLE_RADIUS * 2) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }

      updateShooter();
      if (!gameOver) updateCurrentBubble();

      drawBubbles();
      drawShooter();
      drawCurrentBubble();
      drawNextBubblePreview();

      requestAnimationFrame(gameLoop);
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "ArrowLeft") leftPressed = true;
      if (e.code === "ArrowRight") rightPressed = true;
      if (e.code === "Space") {
        if (!spacePressed && !gameOver && !currentBubble) spawnBubble();
        spacePressed = true;
      }
      if (e.code === "KeyR") resetGame();
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "ArrowLeft") leftPressed = false;
      if (e.code === "ArrowRight") rightPressed = false;
      if (e.code === "Space") spacePressed = false;
    });

    restartBtn.addEventListener("click", resetGame);

    resetGame();
    gameLoop();
  </script>
</body>

</html>
